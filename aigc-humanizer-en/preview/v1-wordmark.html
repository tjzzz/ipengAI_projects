<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huma V1 — 字标版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-light: #6366f1;
      --primary-dark: #3730a3;
      --primary-bg: #eef2ff;
      --accent: #06b6d4;
      --accent-bg: #ecfeff;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --white: #ffffff;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--gray-900);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* ===== NAVBAR V1 — 字标强化 ===== */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-200);
    }

    .nav-container {
      display: flex; align-items: center; justify-content: space-between;
      height: 68px;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }

    /* V1: 紫色方块 H + 渐变字标 */
    .logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.3rem;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex; align-items: center; gap: 24px;
    }

    .nav-link {
      color: var(--gray-600);
      text-decoration: none;
      font-size: 0.9rem; font-weight: 500;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--primary); }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      font-weight: 500; font-size: 0.9rem;
      cursor: pointer; transition: all 0.2s;
      border: 1.5px solid transparent;
      font-family: inherit;
      text-decoration: none;
    }
    .btn-outline {
      background: transparent; color: var(--gray-700);
      border-color: var(--gray-300);
    }
    .btn-outline:hover { background: var(--gray-50); border-color: var(--gray-400); }

    /* ===== HERO ===== */
    .hero {
      padding: 140px 0 60px;
      background: linear-gradient(180deg, var(--gray-50) 0%, var(--white) 100%);
      overflow: hidden;
      min-height: 100vh;
      display: flex; align-items: center;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    /* V1 hero-brand: 渐变圆角标签 */
    .hero-brand {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 20px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border-radius: 24px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 24px;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
    }

    .brand-dot {
      font-size: 0.8rem;
      opacity: 0.8;
    }

    .hero-title {
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .gradient-text {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 1.1rem;
      color: var(--gray-500);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .hero-stats {
      display: flex;
      gap: 40px;
    }

    .stat-item { text-align: center; }
    .stat-number { display: block; font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.85rem; color: var(--gray-500); }

    .hero-upload {
      background: var(--white);
      border: 1.5px dashed var(--gray-300);
      border-radius: var(--radius);
      padding: 40px 32px;
      text-align: center;
    }

    .drop-icon { margin-bottom: 16px; color: var(--gray-400); }
    .drop-text { font-size: 1rem; color: var(--gray-600); margin-bottom: 8px; }
    .drop-link { color: var(--primary); cursor: pointer; font-weight: 500; }
    .drop-hint { font-size: 0.85rem; color: var(--gray-400); }

    .divider {
      display: flex; align-items: center; gap: 16px;
      margin: 24px 0;
      color: var(--gray-400);
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--gray-200);
    }

    .text-input { width: 100%; height: 100px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 12px; font-family: inherit; font-size: 0.9rem; resize: none; }
    .btn-primary { background: var(--primary); color: var(--white); justify-content: center; width: 100%; padding: 14px 28px; border-radius: var(--radius); font-size: 1rem; font-weight: 600; margin-top: 16px; }
    .upload-note { font-size: 0.8rem; color: var(--gray-400); text-align: center; margin-top: 12px; }

    /* ===== V1 Banner Tag ===== */
    .version-tag {
      position: fixed; top: 80px; right: 24px;
      background: var(--primary); color: #fff;
      padding: 6px 14px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 600;
      z-index: 99;
      box-shadow: 0 2px 8px rgba(79,70,229,0.3);
    }

    @media (max-width: 768px) {
      .hero-grid { grid-template-columns: 1fr; gap: 40px; }
      .hero-title { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="version-tag">V1 · 字标版</div>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="#" class="logo">
        <span class="logo-mark">H</span>
        <span class="logo-text">Huma</span>
      </a>
      <div class="nav-links">
        <a href="#" class="nav-link">功能</a>
        <a href="#" class="nav-link">定价</a>
        <a href="#" class="nav-link">常见问题</a>
        <button class="btn btn-outline">登录</button>
      </div>
    </div>
  </nav>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <div class="container">
      <div class="hero-grid">
        <div class="hero-content">
          <div class="hero-brand">
            <span class="brand-dot">✦</span>
            Huma
          </div>
          <h1 class="hero-title">
            <span class="gradient-text">AI辅助英文写作</span><br>
            让论文更自然
          </h1>
          <p class="hero-subtitle">
            上传英文论文或粘贴文字，一键检测 AI 率。精准改写、保留原意，<br>
            轻松通过 Turnitin、GPTZero 等主流检测平台。
          </p>
          <div class="hero-stats">
            <div class="stat-item">
              <span class="stat-number">7天</span>
              <span class="stat-label">无限修改</span>
            </div>
            <div class="stat-item">
              <span class="stat-number">200词</span>
              <span class="stat-label">免费检测</span>
            </div>
          </div>
        </div>
        <div class="hero-upload">
          <div class="drop-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="drop-text">拖拽文档到此处，或 <span class="drop-link">点击选择文件</span></p>
          <p class="drop-hint">支持 .docx、.pdf、.txt、.md，最大 20MB</p>
          <div class="divider"><span>或</span></div>
          <textarea class="text-input" placeholder="直接粘贴你的英文文本到这里...&#10;&#10;支持 200 词的免费检测"></textarea>
          <button class="btn-primary">立即检测 AI 率</button>
          <p class="upload-note">免费检测，无需注册。检测结果包含 AI 率、段落分析和修改建议。</p>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
