<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" width="720" height="260">
  <defs>
    <linearGradient id="gLogo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- === 方案B：纯字标 + AI 标记 === -->

  <!-- 纯字体 iPengAI 作为主体 -->
  <g transform="translate(0,0)">
    <!-- 背景微网格（科技感） -->
    <g opacity="0.025">
      <line x1="0" y1="40" x2="720" y2="40" stroke="#3B82F6" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="720" y2="80" stroke="#3B82F6" stroke-width="0.5"/>
      <line x1="0" y1="120" x2="720" y2="120" stroke="#3B82F6" stroke-width="0.5"/>
      <line x1="0" y1="160" x2="720" y2="160" stroke="#3B82F6" stroke-width="0.5"/>
      <line x1="0" y1="200" x2="720" y2="200" stroke="#3B82F6" stroke-width="0.5"/>
    </g>

    <!-- i -->
    <text x="40" y="172" font-family="'SF Pro Display','Helvetica Neue','Inter','Segoe UI',sans-serif"
          font-size="100" font-weight="600" fill="#1E293B">i</text>

    <!-- P -->
    <text x="98" y="172" font-family="'SF Pro Display','Helvetica Neue','Inter','Segoe UI',sans-serif"
          font-size="100" font-weight="600" fill="#1E293B">Peng</text>

    <!-- AI: 渐变高亮 -->
    <text x="310" y="172" font-family="'SF Pro Display','Helvetica Neue','Inter','Segoe UI',sans-serif"
          font-size="100" font-weight="600" fill="url(#gLogo)">AI</text>

    <!-- i上的数据节点发光 -->
    <circle cx="52" cy="60" r="7" fill="#3B82F6"/>
    <circle cx="52" cy="60" r="16" fill="#3B82F6" opacity="0.08"/>
    <circle cx="52" cy="60" r="26" fill="#3B82F6" opacity="0.04"/>

    <!-- "AI" 下方装饰线 -->
    <line x1="312" y1="198" x2="510" y2="198" stroke="url(#gLogo)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>