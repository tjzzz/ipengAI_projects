<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="ai" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="full" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- ===== 方案A：双生芃 · 生长与智能 ===== -->
  <!-- 概念：两笔极简线条构成芃的骨架，上方两"芽"代表AI节点，下方一笔贯穿代表数据根基 -->

  <!-- 核心圆环 — 汇聚感 -->
  <circle cx="200" cy="190" r="130" fill="none" stroke="url(#full)" stroke-width="1.5" opacity="0.12"/>

  <!-- 芃字主体 — 极简笔画 -->

  <!-- 艹 左芽（绿色，自然生长） — 向上生长的弧线 -->
  <path d="M 135,210 Q 130,160 140,110 Q 145,90 155,75"
        stroke="url(#grow)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- 左芽尖 → 圆形节点（AI） -->
  <circle cx="155" cy="72" r="10" fill="#10B981"/>
  <circle cx="155" cy="72" r="18" fill="#10B981" opacity="0.15"/>

  <!-- 艹 右芽（绿色，自然生长） — 对称但略有差异 -->
  <path d="M 265,210 Q 270,160 260,110 Q 255,90 245,75"
        stroke="url(#grow)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- 右芽尖 → 圆形节点（AI） -->
  <circle cx="245" cy="72" r="10" fill="#34D399"/>
  <circle cx="245" cy="72" r="18" fill="#34D399" opacity="0.15"/>

  <!-- 艹 横线 — 连接两芽 -->
  <line x1="115" y1="155" x2="285" y2="155" stroke="#10B981" stroke-width="8" stroke-linecap="round"/>

  <!-- 两节点之间的 AI 连接弧线 -->
  <path d="M 163,72 Q 200,48 237,72"
        stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="4,4"/>

  <!-- 凡 · 丿（一撇） — 宽弧线承载整体 -->
  <path d="M 105,225 Q 160,205 295,225"
        stroke="url(#ai)" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- 凡 · 丨（竖） — 中轴，数据之脉 -->
  <line x1="200" y1="218" x2="200" y2="335" stroke="url(#ai)" stroke-width="9" stroke-linecap="round"/>

  <!-- 凡 · 点 → AI核心（唯一的高亮元素） -->
  <circle cx="200" cy="270" r="12" fill="#3B82F6"/>
  <circle cx="200" cy="270" r="22" fill="#3B82F6" opacity="0.15"/>
  <circle cx="200" cy="270" r="32" fill="#3B82F6" opacity="0.06"/>

  <!-- 凡 · ⼄（横折弯钩） — 向右延伸 -->
  <path d="M 200,295 Q 240,305 280,318 Q 295,324 290,314"
        stroke="url(#ai)" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- 底部：数据粒子散开（生长的意象） -->
  <circle cx="170" cy="345" r="3" fill="#3B82F6" opacity="0.3"/>
  <circle cx="200" cy="352" r="4" fill="#10B981" opacity="0.4"/>
  <circle cx="230" cy="348" r="3" fill="#7C3AED" opacity="0.3"/>
  <circle cx="185" cy="360" r="2" fill="#8B5CF6" opacity="0.25"/>
  <circle cx="218" cy="362" r="2" fill="#3B82F6" opacity="0.2"/>
</svg>
