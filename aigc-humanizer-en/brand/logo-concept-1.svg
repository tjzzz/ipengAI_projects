<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" width="720" height="260">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="gG" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <linearGradient id="gB" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
    <linearGradient id="gP" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- === 方案A：图标三柱 + 字标 === -->

  <!-- 三根数据柱（=三芽=数据增长） -->
  <rect x="20" y="118" width="18" height="82" rx="9" fill="url(#gG)"/>
  <rect x="48" y="85" width="18" height="115" rx="9" fill="url(#gB)"/>
  <rect x="76" y="100" width="18" height="100" rx="9" fill="url(#gP)"/>

  <!-- 柱顶节点（AI 数据采集点） -->
  <circle cx="29" cy="116" r="4" fill="#10B981" opacity="0.7"/>
  <circle cx="57" cy="83" r="4" fill="#3B82F6" opacity="0.7"/>
  <circle cx="85" cy="98" r="4" fill="#8B5CF6" opacity="0.7"/>

  <!-- 底部连接线 -->
  <line x1="21" y1="200" x2="94" y2="200" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- 右侧文字 iPengAI -->
  <g transform="translate(130, 0)">
    <!-- 字标主体 -->
    <text x="0" y="172" font-family="'SF Pro Display','Helvetica Neue','Inter','Segoe UI',sans-serif"
          font-size="90" font-weight="700" fill="#1E293B" letter-spacing="0">i</text>

    <!-- P -->
    <text x="48" y="172" font-family="'SF Pro Display','Helvetica Neue','Inter','Segoe UI',sans-serif"
          font-size="90" font-weight="700" fill="#1E293B" letter-spacing="0">Peng</text>

    <!-- AI（紫色渐变强调） -->
    <text x="245" y="172" font-family="'SF Pro Display','Helvetica Neue','Inter','Segoe UI',sans-serif"
          font-size="90" font-weight="700" fill="url(#g1)" letter-spacing="0">AI</text>
  </g>

  <!-- "i" 的点：数据节点 -->
  <circle cx="138" cy="72" r="7" fill="url(#g1)"/>
  <circle cx="138" cy="72" r="14" fill="#3B82F6" opacity="0.08"/>
</svg>