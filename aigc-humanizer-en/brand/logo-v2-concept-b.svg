<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bGreen" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#047857"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <linearGradient id="bBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="bFull" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#047857"/>
      <stop offset="45%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <filter id="bGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== 方案B：方圆芃 · 规整中的生长 ===== -->
  <!-- 概念：用圆角矩形的"胶囊"语汇重构芃字笔画 -->
  <!-- 整个标志是圆角方块/胶囊的组合，非常modern tech -->
  <!-- 远看是一个方块中有三支向上生长的"芽"——极简科技品牌 -->

  <!-- 外框：大圆角正方形（品牌容器） -->
  <rect x="68" y="68" width="264" height="264" rx="52" fill="none" stroke="url(#bFull)" stroke-width="2" opacity="0.12"/>

  <!-- === 草字头 === -->

  <!-- 左芽：向上的圆角条 -->
  <rect x="118" y="100" width="18" height="100" rx="9" fill="url(#bGreen)"/>

  <!-- 右芽：向上的圆角条（稍高 = 生机） -->
  <rect x="264" y="80" width="18" height="120" rx="9" fill="url(#bGreen)"/>

  <!-- 横线：连接 -->
  <rect x="102" y="168" width="196" height="14" rx="7" fill="#10B981"/>

  <!-- 芽顶节点（AI） -->
  <circle cx="127" cy="92" r="9" fill="#34D399" filter="url(#bGlow)"/>
  <circle cx="273" cy="72" r="9" fill="#34D399" filter="url(#bGlow)"/>

  <!-- 两节点之间：弧形连接 -->
  <path d="M 136,92 Q 200,58 264,72"
        stroke="#3B82F6" stroke-width="2.5" fill="none" opacity="0.4"/>
  <circle cx="200" cy="72" r="6" fill="#3B82F6"/>

  <!-- === 凡 === -->

  <!-- 丿：宽弧线（胶囊化） -->
  <rect x="90" y="218" width="220" height="14" rx="7" fill="url(#bBlue)"/>

  <!-- 丨：中轴竖线 -->
  <rect x="193" y="234" width="14" height="110" rx="7" fill="url(#bBlue)"/>

  <!-- 点：AI核心（菱形胶囊） -->
  <rect x="190" y="270" width="20" height="20" rx="4" transform="rotate(45,200,280)" fill="#3B82F6" filter="url(#bGlow)"/>
  <circle cx="200" cy="280" r="24" fill="#3B82F6" opacity="0.08"/>

  <!-- ⼄：右下弯钩 -->
  <path d="M 200,300 Q 245,310 285,325"
        stroke="url(#bBlue)" stroke-width="12" fill="none" stroke-linecap="round"/>
</svg>
