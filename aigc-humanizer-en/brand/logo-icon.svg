<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="240" height="280">
  <defs>
    <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="40%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="ggH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- 背景光晕 -->
  <circle cx="120" cy="135" r="125" fill="url(#coreGlow)"/>

  <!-- 芃 字图标（无背景文字，纯汉字+AI点缀） -->
  <g transform="translate(10, 10)">

    <!-- AI神经网络微节点（草字头顶部） -->
    <circle cx="78" cy="52" r="3" fill="#10B981" opacity="0.7"/>
    <circle cx="112" cy="42" r="4" fill="#3B82F6" opacity="0.85"/>
    <circle cx="146" cy="58" r="3" fill="#8B5CF6" opacity="0.7"/>
    <line x1="81" y1="52" x2="110" y2="44" stroke="#3B82F6" stroke-width="0.8" opacity="0.3"/>
    <line x1="113" y1="44" x2="143" y2="58" stroke="#3B82F6" stroke-width="0.8" opacity="0.3"/>

    <!-- 艹 草字头 -->
    <!-- 左竖芽 -->
    <path d="M 72,170 L 70,105 Q 69,80 76,52" stroke="url(#gg)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- 右竖芽 -->
    <path d="M 152,170 L 154,105 Q 155,80 149,52" stroke="url(#gg)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- 横线 -->
    <line x1="52" y1="112" x2="168" y2="112" stroke="url(#ggH)" stroke-width="7" stroke-linecap="round"/>

    <!-- 凡 部分 -->
    <!-- 丿 -->
    <path d="M 38,188 Q 72,170 172,188" stroke="url(#gg)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- 丨 -->
    <line x1="112" y1="182" x2="112" y2="265" stroke="url(#ggH)" stroke-width="7.5" stroke-linecap="round"/>
    <!-- ⼄ -->
    <path d="M 112,230 Q 142,248 178,262 Q 192,268 200,262" stroke="url(#gg)" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- 点（AI核心） -->
    <rect x="130" y="200" width="9" height="9" rx="2" fill="#3B82F6" opacity="0.95"/>
    <circle cx="134" cy="205" r="16" fill="#3B82F6" opacity="0.1"/>

    <!-- 微型虚线连接 -->
    <line x1="76" y1="55" x2="134" y2="200" stroke="#3B82F6" stroke-width="0.4" opacity="0.1" stroke-dasharray="2,6"/>
    <line x1="112" y1="44" x2="134" y2="200" stroke="#3B82F6" stroke-width="0.5" opacity="0.12" stroke-dasharray="2,6"/>
    <line x1="149" y1="58" x2="134" y2="200" stroke="#8B5CF6" stroke-width="0.4" opacity="0.1" stroke-dasharray="2,6"/>
  </g>
</svg>