<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" width="400" height="460">
  <defs>
    <linearGradient id="gLogo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- 垂直布局：图标在上 + 文字在下 -->

  <!-- 外框 -->
  <circle cx="200" cy="175" r="130" fill="none" stroke="url(#gLogo)" stroke-width="2" opacity="0.08"/>
  <circle cx="200" cy="175" r="112" fill="none" stroke="url(#gLogo)" stroke-width="0.8" opacity="0.04"/>

  <!-- 抽象图标：三芽/三柱 + 数据网络 -->
  <!-- 三根数据柱向上生长 -->
  <rect x="148" y="165" width="20" height="75" rx="10" fill="#10B981"/>
  <rect x="178" y="120" width="20" height="120" rx="10" fill="#3B82F6"/>
  <rect x="208" y="140" width="20" height="100" rx="10" fill="#8B5CF6"/>

  <!-- 柱顶发光节点 -->
  <circle cx="158" cy="163" r="6" fill="#10B981" opacity="0.8"/>
  <circle cx="188" cy="118" r="6" fill="#3B82F6" opacity="0.8"/>
  <circle cx="218" cy="138" r="6" fill="#8B5CF6" opacity="0.8"/>

  <!-- 节点间连线（神经网络） -->
  <line x1="164" y1="163" x2="188" y2="118" stroke="#3B82F6" stroke-width="1.2" opacity="0.2" stroke-dasharray="3,4"/>
  <line x1="188" y1="118" x2="218" y2="138" stroke="#3B82F6" stroke-width="1.2" opacity="0.2" stroke-dasharray="3,4"/>
  <line x1="164" y1="163" x2="218" y2="138" stroke="#8B5CF6" stroke-width="1.2" opacity="0.15" stroke-dasharray="3,4"/>

  <!-- 底部文字 -->
  <g transform="translate(0, 335)">
    <text x="200" y="0" font-family="'SF Pro Display','Helvetica Neue','Inter','Segoe UI',sans-serif"
          font-size="46" font-weight="700" fill="#1E293B" text-anchor="middle" letter-spacing="6">iPeng<span style="fill:url(#gLogo);">AI</span></text>
    <text x="200" y="38" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif"
          font-size="14" font-weight="300" fill="#94A3B8" text-anchor="middle" letter-spacing="4">生于数据 · 蓬勃生长</text>
  </g>
</svg>