<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>个人账户 - Huma</title>
    <meta name="description" content="查看 Huma 账户余额与历史订单。">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://ipengai.cn/orders">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%234f46e5'/%3E%3Ctext x='16' y='22' font-family='Inter,sans-serif' font-weight='800' font-size='18' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Orders page specific overrides */
        .orders-page .navbar {
            position: relative;
        }
        .orders-page .hero {
            display: none;
        }
    </style>
    <!-- Baidu Tongji -->
    <script>
    var _hmt = _hmt || [];
    (function() {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?66d3bb29bac3c24749e02d0bcac2e6b8";
      var s = document.getElementsByTagName("script")[0];
      s.parentNode.insertBefore(hm, s);
    })();
    </script>
</head>
<body class="orders-page">

    <!-- ============ NAV ============ -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="/" class="logo">
                <img src="{{ url_for('static', filename='logo.svg') }}" alt="Huma" height="32">
            </a>
            <button class="menu-toggle" id="menuToggle" aria-label="菜单" onclick="toggleAccountMenu()">
                <span class="menu-bar"></span>
                <span class="menu-bar"></span>
                <span class="menu-bar"></span>
            </button>
            <div class="nav-links">
                <a href="/#features" class="nav-link">功能</a>
                <a href="/#pricing" class="nav-link">定价</a>
                <a href="/#faq" class="nav-link">常见问题</a>
                <a href="/orders" class="nav-link" id="orders-link" style="display:none;">个人账户</a>
                <span class="nav-balance" id="nav-balance" style="display:none;" title="账户词数余额"></span>
                <span class="nav-user" id="nav-user" style="display:none;"></span>
                <button class="btn btn-outline btn-sm" id="login-btn" onclick="showAuthModal('login')">登录</button>
                <button class="btn btn-outline btn-sm" id="logout-btn" style="display:none;" onclick="logout()">退出</button>
            </div>
        </div>
    </nav>

    <!-- ============ ORDERS CONTENT ============ -->
    <section class="section">
        <div class="container">
            {% if needs_login %}
            <div class="orders-empty" style="padding:100px 24px;">
                <div class="orders-empty-icon">🔒</div>
                <div class="orders-empty-text">请登录后进入个人账户</div>
                <button class="btn btn-primary btn-lg" onclick="showAuthModal('login')">去登录</button>
            </div>
            {% else %}
            <div class="account-header">
                <div>
                    <div class="account-eyebrow">PERSONAL ACCOUNT</div>
                    <h1 class="orders-title">个人账户</h1>
                    <p class="account-subtitle" id="account-email">管理词数余额与历史订单</p>
                </div>
                <a href="/" class="btn btn-primary">开始新任务</a>
            </div>

            <div class="account-grid">
                <div class="account-card balance-card">
                    <div class="account-card-label">当前可用余额</div>
                    <div class="account-balance"><span id="account-balance-value">--</span><small>词</small></div>
                    <div class="account-card-note">改写时自动扣除，余额不足可扫码补足</div>
                </div>
                <div class="account-card redeem-card">
                    <div class="account-card-label">兑换充值码</div>
                    <div class="account-redeem-row">
                        <input type="text" class="auth-input" id="account-redeem-code" placeholder="输入 HUMA 兑换码" autocomplete="off">
                        <button class="btn btn-primary" id="account-redeem-btn" onclick="redeemFromAccount()">兑换</button>
                    </div>
                    <div class="account-redeem-message" id="account-redeem-message"></div>
                </div>
            </div>

            <div class="orders-header account-orders-header">
                <div>
                    <div class="account-eyebrow">ORDER HISTORY</div>
                    <h2 class="orders-title">历史订单</h2>
                </div>
            </div>

            <!-- Orders List -->
            <div class="orders-list" id="orders-list">
                <!-- Rendered by JavaScript -->
            </div>

            <!-- Empty State -->
            <div class="orders-empty" id="orders-empty" style="display:none;">
                <div class="orders-empty-icon">📄</div>
                <div class="orders-empty-text">暂无订单，去检测文本</div>
                <a href="/" class="btn btn-primary btn-lg">去检测</a>
            </div>

            <!-- Pagination -->
            <div class="orders-pagination" id="orders-pagination" style="display:none;">
                <button class="pagination-btn" id="page-prev" onclick="goToPage(currentOrderPage - 1)">← 上一页</button>
                <span class="pagination-info" id="page-info">第 1 / 1 页</span>
                <button class="pagination-btn" id="page-next" onclick="goToPage(currentOrderPage + 1)">下一页 →</button>
            </div>
            {% endif %}
        </div>
    </section>

    <!-- ============ AUTH MODAL ============ -->
    <div class="modal-overlay" id="auth-modal" style="display:none;">
        <div class="modal auth-modal">
            <button class="modal-close" onclick="closeAuthModal()">&times;</button>
            <div class="modal-body">
                <div class="modal-icon">👤</div>
                <h3 class="modal-title">账户</h3>
                <div class="auth-tabs">
                    <button class="auth-tab active" id="auth-tab-login" onclick="switchAuthTab('login')">登录</button>
                    <button class="auth-tab" id="auth-tab-register" onclick="switchAuthTab('register')">注册</button>
                </div>
                <div class="auth-form" id="auth-form-login">
                    <input type="email" class="auth-input" id="login-email" placeholder="邮箱地址" autocomplete="email">
                    <div class="password-wrapper">
                        <input type="password" class="auth-input password-input" id="login-password" placeholder="密码" autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('login-password', this)" aria-label="切换密码显示" tabindex="-1">
                            <svg class="eye-icon eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-icon eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div class="auth-error" id="login-error"></div>
                    <button class="btn btn-primary btn-lg btn-full" onclick="handleLogin()">登录</button>
                </div>
                <div class="auth-form" id="auth-form-register" style="display:none;">
                    <input type="email" class="auth-input" id="register-email" placeholder="邮箱地址" autocomplete="email">
                    <div class="password-wrapper">
                        <input type="password" class="auth-input password-input" id="register-password" placeholder="密码（至少 6 位）" autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('register-password', this)" aria-label="切换密码显示" tabindex="-1">
                            <svg class="eye-icon eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-icon eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" class="auth-input password-input" id="register-confirm" placeholder="确认密码" autocomplete="new-password">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('register-confirm', this)" aria-label="切换密码显示" tabindex="-1">
                            <svg class="eye-icon eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="eye-icon eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div class="auth-error" id="register-error"></div>
                    <button class="btn btn-primary btn-lg btn-full" onclick="handleRegister()">注册</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='common.js') }}"></script>
    <script src="{{ url_for('static', filename='auth.js') }}"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
    {% if not needs_login %}
    <script>
        // Wait for checkLoginStatus to complete before loading orders
        document.addEventListener('DOMContentLoaded', async function() {
            // Wait for the login status check to complete
            if (loginStatusPromise) {
                await loginStatusPromise;
            }
            // Now currentUser should be set by checkLoginStatus
            if (currentUser) {
                document.getElementById('account-email').textContent = currentUser.email;
                await loadAccountSummary();
                loadOrders(1);
            }
        });

        async function loadAccountSummary() {
            try {
                const resp = await fetch('/api/user/balance');
                const data = await resp.json();
                if (resp.ok) {
                    document.getElementById('account-balance-value').textContent = Number(data.balance || 0).toLocaleString('zh-CN');
                    updateNavBalance(data.balance || 0);
                }
            } catch (err) {
                document.getElementById('account-balance-value').textContent = '加载失败';
            }
        }

        function toggleAccountMenu() {
            document.querySelector('.nav-links').classList.toggle('active');
            document.getElementById('menuToggle').classList.toggle('open');
        }

        async function redeemFromAccount() {
            const input = document.getElementById('account-redeem-code');
            const button = document.getElementById('account-redeem-btn');
            const message = document.getElementById('account-redeem-message');
            const code = input.value.trim().toUpperCase();
            if (!code) {
                message.className = 'account-redeem-message error';
                message.textContent = '请输入兑换码';
                return;
            }
            button.disabled = true;
            button.textContent = '兑换中...';
            try {
                const resp = await _csrfFetch('/api/redeem-code', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code})
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || '兑换失败');
                message.className = 'account-redeem-message success';
                message.textContent = data.message;
                input.value = '';
                await loadAccountSummary();
            } catch (err) {
                message.className = 'account-redeem-message error';
                message.textContent = err.message;
            } finally {
                button.disabled = false;
                button.textContent = '兑换';
            }
        }
    </script>
    {% endif %}
</body>
</html>
